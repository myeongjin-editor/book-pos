<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>원더박스 판매 시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0b0b14; color: #e8e4dc; font-family: 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', sans-serif; min-height: 100vh; padding-bottom: 90px; }

  /* ── 업로드 화면 ── */
  .upload-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; gap: 0; }
  .upload-logo { font-size: 11px; color: #e8c87a; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .upload-title { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .upload-desc { font-size: 14px; color: #555; margin-bottom: 36px; }
  .upload-box { width: 100%; max-width: 480px; border: 2px dashed #22223a; border-radius: 16px; padding: 44px 32px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; background: #0f0f1c; }
  .upload-box:hover, .upload-box.drag { border-color: rgba(232,200,122,0.5); background: rgba(232,200,122,0.04); }
  .upload-box-icon { font-size: 36px; margin-bottom: 14px; }
  .upload-box-label { font-size: 15px; font-weight: 600; color: #ccc; margin-bottom: 6px; }
  .upload-box-sub { font-size: 12px; color: #444; margin-bottom: 20px; }
  .upload-btn { background: #e8c87a; border: none; color: #0b0b14; border-radius: 8px; padding: 11px 24px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  #file-input { display: none; }
  .upload-guide { margin-top: 28px; max-width: 480px; width: 100%; background: #0f0f1c; border: 1px solid #1a1a28; border-radius: 12px; padding: 20px 22px; }
  .guide-title { font-size: 12px; color: #e8c87a; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .guide-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .guide-table th { color: #555; font-weight: 600; padding: 4px 8px 4px 0; text-align: left; border-bottom: 1px solid #1a1a28; }
  .guide-table td { color: #888; padding: 5px 8px 5px 0; border-bottom: 1px solid #111120; }
  .guide-table td.ex { color: #ccc; }
  .guide-note { font-size: 11px; color: #444; margin-top: 10px; line-height: 1.6; }
  .upload-error { margin-top: 14px; background: rgba(255,100,100,0.08); border: 1px solid rgba(255,100,100,0.2); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #ff8a8a; max-width: 480px; width: 100%; display: none; }

  /* ── 앱 화면 ── */
  .app-screen { display: none; }
  header { background: linear-gradient(155deg,#0e0e1e,#171730); border-bottom: 1px solid #1a1a28; }
  .h-inner { max-width: 860px; margin: 0 auto; padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .h-sub { display: block; font-size: 10px; color: #e8c87a; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
  .h-title { font-size: 18px; font-weight: 800; }
  .h-btns { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sales-btn { display: flex; align-items: center; gap: 6px; background: #111120; border: 1px solid #1c1c2e; border-radius: 10px; padding: 8px 13px; cursor: pointer; color: #888; font-size: 13px; font-weight: 600; font-family: inherit; }
  .sales-badge { background: rgba(232,200,122,0.2); color: #e8c87a; font-size: 11px; font-weight: 800; padding: 1px 7px; border-radius: 20px; }
  .reload-btn { display: flex; align-items: center; gap: 5px; background: #111120; border: 1px solid #1c1c2e; border-radius: 10px; padding: 8px 12px; cursor: pointer; color: #555; font-size: 12px; font-weight: 600; font-family: inherit; }
  .disc-toggle { display: flex; align-items: center; gap: 7px; background: #111120; border: 1px solid #1c1c2e; border-radius: 10px; padding: 8px 13px; cursor: pointer; transition: all .2s; font-family: inherit; }
  .disc-toggle.on { background: rgba(232,200,122,0.08); border-color: rgba(232,200,122,0.3); }
  .disc-icon { width: 22px; height: 22px; border-radius: 50%; background: #1c1c2e; color: #555; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .disc-toggle.on .disc-icon { background: rgba(232,200,122,0.2); color: #e8c87a; }
  .disc-label { font-size: 13px; font-weight: 700; color: #888; }
  .disc-pill { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: #1c1c2e; color: #444; }
  .disc-toggle.on .disc-pill { background: rgba(232,200,122,0.2); color: #e8c87a; }
  .tab-row { max-width: 860px; margin: 0 auto; padding: 12px 20px 0; display: flex; gap: 2px; overflow-x: auto; }
  .tab-btn { background: transparent; border: none; border-bottom: 3px solid transparent; color: #444; font-size: 14px; font-weight: 600; padding: 8px 18px 10px; cursor: pointer; transition: color .2s, border-color .2s; font-family: inherit; white-space: nowrap; flex-shrink: 0; }
  .tab-btn.on { color: #e8e4dc; border-bottom-color: #e8c87a; }
  .toolbar { max-width: 860px; margin: 0 auto; padding: 16px 20px 8px; display: flex; align-items: center; gap: 10px; }
  .search-input { background: #10101a; border: 1px solid #1a1a28; border-radius: 7px; color: #e8e4dc; padding: 8px 13px; font-size: 13px; width: 130px; outline: none; font-family: inherit; }
  .search-cnt { font-size: 12px; color: #333; }
  .list-wrap { max-width: 860px; margin: 0 auto; padding: 4px 20px 24px; display: flex; flex-direction: column; gap: 7px; }
  .book-row { display: flex; align-items: center; gap: 10px; }
  .row-num { width: 22px; text-align: right; font-size: 12px; color: #2a2a3e; flex-shrink: 0; }
  .pill { flex: 1; display: flex; align-items: center; justify-content: space-between; background: #111120; border: 1px solid #1c1c2e; border-radius: 999px; padding: 11px 13px 11px 18px; cursor: pointer; transition: background .15s, border-color .15s; gap: 10px; text-align: left; font-family: inherit; }
  .pill.in-cart { background: rgba(232,200,122,0.07); border-color: rgba(232,200,122,0.25); }
  .pill-title { font-size: 14px; color: #ccc; font-weight: 500; flex: 1; line-height: 1.3; }
  .pill-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .pill-orig { font-size: 11px; color: #3a3a50; text-decoration: line-through; }
  .pill-price { font-size: 13px; color: #333; font-weight: 500; }
  .pill-price.discounted { color: #e8a87a; font-weight: 700; }
  .pill-price.in-cart { color: #e8c87a; font-weight: 700; }
  .pill-badge { background: #e8c87a; color: #0b0b14; font-size: 11px; font-weight: 800; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .scan-btn { background: #111120; border: 1px solid #1c1c2e; border-radius: 8px; color: #888; font-size: 13px; font-weight: 600; padding: 8px 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .scan-modal { background: #121220; border-radius: 16px 16px 0 0; width: 100vw; max-width: 480px; margin: auto auto 0; padding: 20px 20px 32px; display: flex; flex-direction: column; gap: 14px; }
  .scan-head { display: flex; justify-content: space-between; align-items: center; }
  .scan-title { font-size: 16px; font-weight: 800; }
  #scan-reader { width: 100%; border-radius: 10px; overflow: hidden; }
  #scan-reader video { border-radius: 10px; }
  #scan-reader img { display: none; }
  #scan-reader__scan_region { background: #000; border-radius: 10px; }
  #scan-reader__dashboard { background: #0f0f1c; border-radius: 0 0 10px 10px; padding: 8px; }
  #scan-reader__dashboard_section_csr button { background: #1c1c2e; border: 1px solid #2a2a3e; color: #888; border-radius: 6px; padding: 6px 12px; font-family: inherit; font-size: 12px; cursor: pointer; }
  #scan-reader__dashboard_section_swaplink { color: #555; font-size: 11px; }
  .scan-status { font-size: 13px; color: #555; text-align: center; }
  .scan-result { background: rgba(232,200,122,0.08); border: 1px solid rgba(232,200,122,0.3); border-radius: 10px; padding: 14px 16px; }
  .scan-result-title { font-size: 15px; font-weight: 700; color: #e8e4dc; margin-bottom: 4px; }
  .scan-result-price { font-size: 13px; color: #e8c87a; font-weight: 600; margin-bottom: 12px; }
  .scan-result-btn { width: 100%; background: #e8c87a; border: none; color: #0b0b14; border-radius: 8px; padding: 12px 0; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .scan-notfound { font-size: 13px; color: #ff8a8a; text-align: center; }
  .tap-hint { font-size: 11px; color: #2e2e44; margin-left: auto; white-space: nowrap; }
  .footer { position: fixed; bottom: 0; right: 0; padding: 6px 14px; text-align: right; pointer-events: none; z-index: 50; }
  .footer-name { display: block; font-size: 12px; color: #555; font-weight: 600; }
  .footer-email { display: block; font-size: 10px; color: #444; }
  .confirm-modal { background: #161626; border: 1px solid #22223a; border-radius: 14px; padding: 28px 24px 20px; width: min(320px, 88vw); margin: auto; align-self: center; }
  .confirm-msg { font-size: 15px; font-weight: 600; color: #e8e4dc; text-align: center; line-height: 1.6; margin-bottom: 20px; }
  .confirm-sub { font-size: 12px; color: #555; font-weight: 400; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-no  { flex: 1; background: transparent; border: 1px solid #22223a; color: #666; border-radius: 8px; padding: 11px 0; font-size: 14px; cursor: pointer; font-family: inherit; }
  .confirm-yes { flex: 1; background: #e8c87a; border: none; color: #0b0b14; border-radius: 8px; padding: 11px 0; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .empty-msg { text-align: center; color: #333; padding: 48px 0; font-size: 14px; }
  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #13132a; border-top: 1px solid #22223a; z-index: 100; transform: translateY(100%); opacity: 0; transition: transform .3s, opacity .3s; }
  .cart-bar.visible { transform: translateY(0); opacity: 1; }
  .cart-bar-inner { max-width: 860px; margin: 0 auto; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .bar-left { display: flex; align-items: center; gap: 8px; overflow: hidden; }
  .bar-qty { font-size: 15px; font-weight: 800; color: #e8c87a; flex-shrink: 0; }
  .bar-items { font-size: 12px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
  .bar-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .bar-total { font-size: 15px; font-weight: 800; }
  .bar-open-btn { background: #e8c87a; border: none; color: #0b0b14; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; font-family: inherit; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); backdrop-filter: blur(4px); display: flex; justify-content: flex-end; z-index: 200; }
  #scan-overlay { justify-content: center; align-items: flex-end; }
  .drawer { width: min(440px, 100vw); background: #121220; border-left: 1px solid #1e1e30; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 19px 20px 13px; border-bottom: 1px solid #1e1e30; flex-shrink: 0; }
  .drawer-title { font-size: 16px; font-weight: 800; }
  .drawer-qty { font-size: 13px; color: #e8c87a; font-weight: 700; margin-left: 5px; }
  .icon-btn { background: transparent; border: none; color: #444; font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .drawer-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 14px; }
  .drawer-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .drawer-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #111120; gap: 10px; }
  .di-title { font-size: 13px; color: #ccc; line-height: 1.4; flex: 1; }
  .di-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-row { display: flex; align-items: center; gap: 5px; }
  .q-btn { background: #1c1c2e; border: none; color: #888; width: 26px; height: 26px; border-radius: 6px; font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-family: inherit; }
  .q-num { font-size: 14px; font-weight: 700; min-width: 18px; text-align: center; }
  .di-price { font-size: 13px; color: #e8c87a; font-weight: 700; white-space: nowrap; }
  .di-remove { background: transparent; border: none; color: #2e2e44; font-size: 13px; cursor: pointer; }
  .drawer-foot { padding: 14px 20px 22px; border-top: 1px solid #1e1e30; flex-shrink: 0; }
  .drawer-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .dt-label { font-size: 13px; color: #666; }
  .dt-amount { font-size: 22px; font-weight: 800; }
  .checkout-btn { width: 100%; background: #e8c87a; border: none; color: #0b0b14; border-radius: 10px; padding: 14px 0; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .checkout-btn:disabled { background: #1e1e30; color: #333; cursor: default; }
  .receipt-head { padding: 26px 20px 16px; text-align: center; border-bottom: 1px solid #1e1e30; flex-shrink: 0; }
  .receipt-icon { width: 46px; height: 46px; border-radius: 50%; background: rgba(232,200,122,0.12); border: 2px solid #e8c87a; color: #e8c87a; font-size: 20px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .receipt-title { font-size: 19px; font-weight: 800; margin-bottom: 4px; }
  .receipt-sub { font-size: 13px; color: #888; }
  .receipt-disc { color: #e8a87a; font-weight: 700; }
  .receipt-time { font-size: 11px; color: #444; margin-top: 5px; }
  .receipt-row { display: flex; justify-content: space-between; padding: 11px 20px; border-bottom: 1px solid #111120; gap: 10px; }
  .receipt-book { font-size: 13px; color: #aaa; flex: 1; line-height: 1.4; }
  .receipt-amt { font-size: 13px; color: #e8c87a; font-weight: 700; white-space: nowrap; }
  .receipt-close-wrap { padding: 14px 20px 24px; flex-shrink: 0; }
  .csv-btn { background: rgba(232,200,122,0.1); border: 1px solid rgba(232,200,122,0.2); color: #e8c87a; font-size: 12px; font-weight: 700; padding: 5px 11px; border-radius: 8px; cursor: pointer; font-family: inherit; }
  .date-filter { display: flex; gap: 6px; padding: 10px 20px; overflow-x: auto; border-bottom: 1px solid #1a1a28; flex-shrink: 0; }
  .date-btn { background: #111120; border: 1px solid #1c1c2e; color: #555; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 20px; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: inherit; }
  .date-btn.on { background: rgba(232,200,122,0.1); border-color: rgba(232,200,122,0.3); color: #e8c87a; }
  .sales-summary { display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid #1a1a28; flex-shrink: 0; background: #0f0f1c; }
  .sum-item { display: flex; align-items: baseline; gap: 3px; padding: 0 14px; }
  .sum-n { font-size: 19px; font-weight: 800; }
  .sum-l { font-size: 12px; color: #555; }
  .sum-div { width: 1px; height: 22px; background: #1e1e30; }
  .tx-card { padding: 13px 20px; border-bottom: 1px solid #111120; }
  .tx-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; gap: 8px; }
  .tx-time { font-size: 11px; color: #444; }
  .tx-right { display: flex; align-items: center; gap: 7px; }
  .tx-total { font-size: 14px; font-weight: 800; color: #e8c87a; }
  .tx-disc-badge { font-size: 10px; font-weight: 700; background: rgba(232,168,122,0.12); color: #e8a87a; padding: 2px 6px; border-radius: 10px; border: 1px solid rgba(232,168,122,0.2); }
  .tx-items { display: flex; flex-direction: column; gap: 3px; }
  .tx-item { display: flex; justify-content: space-between; gap: 8px; }
  .tx-item-title { font-size: 12px; color: #888; flex: 1; }
  .tx-item-amt { font-size: 12px; color: #555; white-space: nowrap; }
  .del-btn { background: transparent; border: none; color: #2e2e44; font-size: 12px; cursor: pointer; padding: 2px; }
  .del-confirm { display: flex; gap: 5px; }
  .del-yes { background: #3a1a1a; border: 1px solid #5a2a2a; color: #ff6b6b; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .del-no { background: #1c1c2e; border: 1px solid #2e2e44; color: #666; font-size: 11px; padding: 3px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .head-right { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>

<!-- ── 업로드 화면 ── -->
<div class="upload-screen" id="upload-screen">
  <div class="upload-title">도서 판매 시스템</div>
  <div class="upload-desc">도서 목록 엑셀 파일을 업로드해 시작하세요</div>

  <div class="upload-box" id="upload-box"
    onclick="document.getElementById('file-input').click()"
    ondragover="event.preventDefault(); this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="handleDrop(event)">
    <div class="upload-box-icon">📂</div>
    <div class="upload-box-label">엑셀 파일을 여기에 드래그하거나</div>
    <div class="upload-box-sub">.xlsx / .xls 파일 지원</div>
    <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">파일 선택</button>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">

  <div class="upload-error" id="upload-error"></div>

  <div class="upload-guide">
    <div class="guide-title">엑셀 파일 형식</div>
    <table class="guide-table">
      <tr>
        <th>A열 — 분류</th>
        <th>B열 — 도서명</th>
        <th>C열 — 정가</th>
        <th>D열 — ISBN <span style="color:#333;font-weight:400">(선택)</span></th>
      </tr>
    </table>
  </div>
</div>

<!-- ── 앱 화면 ── -->
<div class="app-screen" id="app-screen">
  <header>
    <div class="h-inner">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="h-title">도서 판매 시스템</div>
        <button class="reload-btn" onclick="reloadApp()">↩ 목록 변경</button>
      </div>
      <div class="h-btns">
        <button class="sales-btn" onclick="openSales()">
          📋 판매 내역 <span class="sales-badge" id="sales-badge" style="display:none"></span>
        </button>
        <button class="disc-toggle" id="disc-toggle" onclick="toggleDiscount()">
          <span class="disc-icon" id="disc-icon">%</span>
          <span class="disc-label">10% 할인</span>
          <span class="disc-pill" id="disc-pill">OFF</span>
        </button>
      </div>
    </div>
    <div class="tab-row" id="tab-row"></div>
  </header>

  <div class="toolbar">
    <input class="search-input" placeholder="🔍  제목 검색" oninput="onSearch(this.value)" id="search-input">
    <span class="search-cnt" id="search-cnt"></span>
    <button class="scan-btn" onclick="openScanner()">📷 스캔</button>
  </div>
  <div class="list-wrap" id="book-list"></div>

  <div class="cart-bar" id="cart-bar">
    <div class="cart-bar-inner">
      <div class="bar-left">
        <span>🛒</span>
        <span class="bar-qty" id="bar-qty"></span>
        <span class="bar-items" id="bar-items"></span>
      </div>
      <div class="bar-right">
        <span class="bar-total" id="bar-total"></span>
        <button class="bar-open-btn" onclick="openCart()">장바구니 보기</button>
      </div>
    </div>
  </div>
</div>

<!-- 바코드 스캔 모달 -->
<div class="overlay" id="scan-overlay" style="display:none" onclick="closeScanner(event)">
  <div class="scan-modal" onclick="event.stopPropagation()">
    <div class="scan-head">
      <span class="scan-title">바코드 스캔</span>
      <button class="icon-btn" onclick="closeScanner()">✕</button>
    </div>
    <div id="scan-reader"></div>
    <div class="scan-status" id="scan-status">카메라를 바코드에 가져다 대세요</div>
    <div class="scan-result" id="scan-result" style="display:none"></div>
  </div>
</div>

<!-- 목록 변경 확인 모달 -->
<div class="overlay" id="reload-overlay" style="display:none" onclick="event.stopPropagation()">
  <div class="confirm-modal">
    <p class="confirm-msg">도서 목록을 변경하시겠습니까?<br><span class="confirm-sub">장바구니가 초기화됩니다.</span></p>
    <div class="confirm-btns">
      <button class="confirm-no" onclick="document.getElementById('reload-overlay').style.display='none'">아니오</button>
      <button class="confirm-yes" onclick="doReload()">예</button>
    </div>
  </div>
</div>

<!-- 장바구니 드로어 -->
<div class="overlay" id="cart-overlay" style="display:none" onclick="closeCart(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <span>장바구니 <span class="drawer-qty" id="cart-drawer-qty"></span></span>
      <button class="icon-btn" onclick="closeCart()">✕</button>
    </div>
    <div class="drawer-list" id="cart-drawer-list"></div>
    <div class="drawer-foot">
      <div class="drawer-total-row">
        <span class="dt-label">합계</span>
        <span class="dt-amount" id="cart-drawer-total"></span>
      </div>
      <button class="checkout-btn" id="checkout-btn" onclick="checkout()">결제하기</button>
    </div>
  </div>
</div>

<!-- 영수증 드로어 -->
<div class="overlay" id="receipt-overlay" style="display:none" onclick="closeReceipt(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="receipt-head">
      <div class="receipt-icon">✓</div>
      <div class="receipt-title">결제 완료</div>
      <div class="receipt-sub" id="receipt-sub"></div>
      <div class="receipt-time" id="receipt-time"></div>
    </div>
    <div class="drawer-list" id="receipt-list"></div>
    <div class="receipt-close-wrap">
      <button class="checkout-btn" onclick="closeReceipt()">확인</button>
    </div>
  </div>
</div>

<!-- 판매내역 드로어 -->
<div class="overlay" id="sales-overlay" style="display:none" onclick="closeSales(event)">
  <div class="drawer" onclick="event.stopPropagation()">
    <div class="drawer-head">
      <span class="drawer-title">판매 내역</span>
      <div class="head-right">
        <button class="csv-btn" onclick="exportCSV()">CSV 내보내기</button>
        <button class="icon-btn" onclick="closeSales()">✕</button>
      </div>
    </div>
    <div class="date-filter" id="date-filter"></div>
    <div class="sales-summary" id="sales-summary"></div>
    <div class="drawer-list" id="sales-list"></div>
  </div>
</div>

<div class="footer">
  <span class="footer-name">원더박스 곽편</span>
  <span class="footer-email">balhwa24@gmail.com</span>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────────────
let allBooks = {};       // { "분류명": [{id, title, price}, ...] }
let tabs = [];           // 분류 목록 (순서 유지)
let currentTab = '';
let searchQuery = '';
let discount = false;
let cart = [];
let sales = [];
let selectedDate = 'all';
let confirmDeleteId = null;

const STORAGE_KEY = 'wonderbox-sales-v1';
function loadSales() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveSales() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sales)); }

// ── 유틸 ──────────────────────────────────────────────────────
function toKST(iso) {
  return new Date(iso).toLocaleString('ko-KR', {timeZone:'Asia/Seoul', hour12:false});
}
function dateOnly(iso) {
  return new Date(iso).toLocaleDateString('ko-KR', {timeZone:'Asia/Seoul', year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\. /g,'-').replace('.','');
}
function calcPrice(base) { return discount ? Math.round(base * 0.9 / 10) * 10 : base; }
function fmt(n) { return Number(n).toLocaleString('ko-KR'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 엑셀 파싱 ─────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-box').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      parseBooks(rows, file.name);
    } catch(err) {
      showError('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseBooks(rows, filename) {
  // ── 고정 컬럼 규칙 ──────────────────────────
  // A열(0): 분류   — 비어 있으면 위 행 분류 이어받기
  // B열(1): 도서명
  // C열(2): 정가
  // D열(3): ISBN   — 선택 (없어도 됨)
  // 헤더·타이틀 행은 자동 스킵 (정가 열이 숫자가 아니면 건너뜀)
  // ─────────────────────────────────────────────

  const result = {};
  const order = [];
  let lastCat = '';
  let count = 0;

  for (const row of rows) {
    const cells = row.map(c => String(c ?? '').trim());

    const rawCat  = cells[0] || '';
    const title   = cells[1] || '';
    const rawPrice = cells[2] || '';
    const price   = Number(String(rawPrice).replace(/,/g, ''));

    // 도서명이 없거나 정가가 숫자가 아니면 스킵 (헤더·빈 행 포함)
    if (!title || isNaN(price) || price <= 0) continue;

    // 분류: 공백/줄바꿈 정리 후 비어 있으면 이전 분류 사용
    const cat = rawCat.replace(/\s+/g, ' ').trim() || lastCat || '미분류';
    lastCat = cat;

    if (!result[cat]) { result[cat] = []; order.push(cat); }
    const isbn = String(cells[3] || '').replace(/\D/g, '');
    result[cat].push({ id: cat + '_' + result[cat].length, title, price, isbn });
    count++;
  }

  if (count === 0) {
    showError('도서 데이터를 찾을 수 없습니다.\n열 순서를 확인해 주세요: A=분류 / B=도서명 / C=정가');
    return;
  }

  // 각 분류 내 ㄱㄴㄷ 정렬
  for (const cat of order) {
    result[cat].sort((a, b) => a.title.localeCompare(b.title, 'ko'));
  }

  allBooks = result;
  tabs = order;
  currentTab = tabs[0];
  sales = loadSales();

  startApp();
}

function showError(msg) {
  const el = document.getElementById('upload-error');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

// ── 앱 시작 ───────────────────────────────────────────────────
function startApp() {
  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  buildTabs();
  updateSalesBadge();
  renderBooks();
}

function reloadApp() {
  document.getElementById('reload-overlay').style.display = 'flex';
}
function doReload() {
  document.getElementById('reload-overlay').style.display = 'none';
  cart = [];
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('upload-error').style.display = 'none';
  document.getElementById('file-input').value = '';
}

// ── 탭 ────────────────────────────────────────────────────────
function buildTabs() {
  document.getElementById('tab-row').innerHTML = tabs.map((cat, i) =>
    `<button class="tab-btn${i===0?' on':''}" onclick="switchTab('${escHtml(cat)}', this)">${escHtml(cat)}</button>`
  ).join('');
}

function switchTab(tab, btn) {
  currentTab = tab;
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderBooks();
}

// ── 할인 ──────────────────────────────────────────────────────
function toggleDiscount() {
  discount = !discount;
  document.getElementById('disc-toggle').classList.toggle('on', discount);
  document.getElementById('disc-icon').textContent = discount ? '✓' : '%';
  document.getElementById('disc-pill').textContent = discount ? '적용 중' : 'OFF';
  renderBooks();
  updateCartBar();
}

function onSearch(val) { searchQuery = val; renderBooks(); }

// ── 도서 목록 렌더 ────────────────────────────────────────────
function renderBooks() {
  const books = allBooks[currentTab] || [];
  const filtered = books.filter(b => b.title.includes(searchQuery));
  document.getElementById('search-cnt').textContent = filtered.length + '권';
  const wrap = document.getElementById('book-list');
  if (!filtered.length) { wrap.innerHTML = '<p class="empty-msg">검색 결과가 없습니다.</p>'; return; }
  wrap.innerHTML = filtered.map((book, i) => {
    const cp = calcPrice(book.price);
    const cartItem = cart.find(c => c.id === book.id);
    const qty = cartItem ? cartItem.qty : 0;
    let priceClass = 'pill-price' + (qty > 0 ? ' in-cart' : discount ? ' discounted' : '');
    return `
      <div class="book-row">
        <span class="row-num">${i+1}</span>
        <button class="pill${qty>0?' in-cart':''}"
          onclick="tapBook('${escHtml(book.id)}')"
          oncontextmenu="event.preventDefault(); addQty('${escHtml(book.id)}')">
          <span class="pill-title">${escHtml(book.title)}</span>
          <span class="pill-right">
            ${discount ? `<span class="pill-orig">${fmt(book.price)}원</span>` : ''}
            <span class="${priceClass}">${fmt(cp)}원</span>
            ${qty > 0 ? `<span class="pill-badge">${qty > 1 ? qty : ''} −</span>` : ''}
          </span>
        </button>
      </div>`;
  }).join('');
}

// ── 장바구니 ──────────────────────────────────────────────────
// 탭: 담겨 있으면 −1, 없으면 +1
function tapBook(id) {
  const book = Object.values(allBooks).flat().find(b => b.id === id);
  if (!book) return;
  const exists = cart.find(i => i.id === id);
  if (exists) {
    exists.qty--;
    if (exists.qty <= 0) cart = cart.filter(i => i.id !== id);
  } else {
    cart.push({...book, price: calcPrice(book.price), qty: 1});
  }
  renderBooks(); updateCartBar();
}

// 우클릭 or 길게 누르기: +1
function addQty(id) {
  const book = Object.values(allBooks).flat().find(b => b.id === id);
  if (!book) return;
  const exists = cart.find(i => i.id === id);
  if (exists) exists.qty++;
  else cart.push({...book, price: calcPrice(book.price), qty: 1});
  renderBooks(); updateCartBar();
}

// ── 바코드 스캐너 ─────────────────────────────────────────────
let html5QrCode = null;

function openScanner() {
  document.getElementById('scan-overlay').style.display = 'flex';
  document.getElementById('scan-result').style.display = 'none';
  document.getElementById('scan-status').textContent = '카메라를 바코드에 가져다 대세요';
  startScanner();
}

function closeScanner(e) {
  if (e && e.target !== document.getElementById('scan-overlay')) return;
  stopScanner();
  document.getElementById('scan-overlay').style.display = 'none';
}

function startScanner() {
  if (html5QrCode) return;
  html5QrCode = new Html5Qrcode('scan-reader');
  html5QrCode.start(
    { facingMode: 'environment' },
    { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.5 },
    (decodedText) => {
      const isbn = decodedText.replace(/\D/g, '');
      handleScanResult(isbn);
    },
    () => {}
  ).catch(() => {
    document.getElementById('scan-status').textContent = '카메라를 사용할 수 없습니다.';
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      html5QrCode = null;
    }).catch(() => { html5QrCode = null; });
  }
}

function handleScanResult(isbn) {
  const allFlat = Object.values(allBooks).flat();
  const book = allFlat.find(b => b.isbn && b.isbn === isbn);
  const resultEl = document.getElementById('scan-result');
  const statusEl = document.getElementById('scan-status');

  if (book) {
    const cp = calcPrice(book.price);
    statusEl.textContent = '✓ 인식됨';
    resultEl.style.display = 'block';
    resultEl.innerHTML = `
      <div class="scan-result-title">${escHtml(book.title)}</div>
      <div class="scan-result-price">${fmt(cp)}원</div>
      <button class="scan-result-btn" onclick="scanAddToCart('${book.id}')">장바구니에 담기</button>`;
  } else {
    statusEl.textContent = '';
    resultEl.style.display = 'block';
    resultEl.innerHTML = `<div class="scan-notfound">목록에 없는 도서입니다</div>`;
    setTimeout(() => {
      resultEl.style.display = 'none';
      statusEl.textContent = '카메라를 바코드에 가져다 대세요';
    }, 2000);
  }
}

function scanAddToCart(id) {
  addQty(id);
  stopScanner();
  document.getElementById('scan-overlay').style.display = 'none';
  renderBooks();
  updateCartBar();
}
let pressTimer = null;
document.addEventListener('touchstart', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  pressTimer = setTimeout(() => {
    pressTimer = null;
    const match = btn.getAttribute('oncontextmenu');
    if (match) {
      const id = match.match(/'([^']+)'\)/)?.[1];
      if (id) addQty(id);
    }
  }, 500);
}, {passive: true});
document.addEventListener('touchend', () => {
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
}, {passive: true});
document.addEventListener('touchmove', () => {
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
}, {passive: true});

function updateCartBar() {
  const totalQty = cart.reduce((s,i) => s+i.qty, 0);
  const totalAmt = cart.reduce((s,i) => s+i.price*i.qty, 0);
  document.getElementById('cart-bar').classList.toggle('visible', totalQty > 0);
  document.getElementById('bar-qty').textContent = totalQty + '권';
  document.getElementById('bar-items').textContent =
    cart.slice(0,2).map(i=>i.title).join(', ') + (cart.length>2?` 외 ${cart.length-2}종`:'');
  document.getElementById('bar-total').textContent = fmt(totalAmt) + '원';
}

function openCart() { renderCartDrawer(); document.getElementById('cart-overlay').style.display = 'flex'; }
function closeCart(e) { if (!e || e.target===document.getElementById('cart-overlay')) document.getElementById('cart-overlay').style.display='none'; }

function renderCartDrawer() {
  const totalQty = cart.reduce((s,i)=>s+i.qty,0);
  const totalAmt = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cart-drawer-qty').textContent = totalQty+'권';
  document.getElementById('cart-drawer-total').textContent = fmt(totalAmt)+'원';
  document.getElementById('checkout-btn').disabled = cart.length===0;
  const list = document.getElementById('cart-drawer-list');
  if (!cart.length) { list.innerHTML='<div class="drawer-empty">담긴 도서가 없습니다</div>'; return; }
  list.innerHTML = cart.map(item=>`
    <div class="drawer-item">
      <div class="di-title">${escHtml(item.title)}</div>
      <div class="di-right">
        <div class="qty-row">
          <button class="q-btn" onclick="changeQty('${item.id}',${item.qty-1})">−</button>
          <span class="q-num">${item.qty}</span>
          <button class="q-btn" onclick="changeQty('${item.id}',${item.qty+1})">+</button>
        </div>
        <span class="di-price">${fmt(item.price*item.qty)}원</span>
        <button class="di-remove" onclick="changeQty('${item.id}',0)">✕</button>
      </div>
    </div>`).join('');
}

function changeQty(id, qty) {
  if (qty<=0) cart = cart.filter(i=>i.id!==id);
  else { const item = cart.find(i=>i.id===id); if(item) item.qty=qty; }
  renderBooks(); updateCartBar(); renderCartDrawer();
}

// ── 결제 ──────────────────────────────────────────────────────
function checkout() {
  const tx = {
    id: Date.now().toString(),
    paidAt: new Date().toISOString(),
    discounted: discount,
    items: cart.map(i=>({id:i.id,title:i.title,price:i.price,qty:i.qty}))
  };
  sales.push(tx); saveSales(); updateSalesBadge();
  showReceipt(tx);
  cart = []; renderBooks(); updateCartBar();
  document.getElementById('cart-overlay').style.display='none';
}

function showReceipt(tx) {
  const total = tx.items.reduce((s,i)=>s+i.price*i.qty,0);
  const totalQty = tx.items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('receipt-sub').innerHTML =
    `${totalQty}권 · ${fmt(total)}원` +
    (tx.discounted?' <span class="receipt-disc">· 10% 할인 적용</span>':'');
  document.getElementById('receipt-time').textContent = toKST(tx.paidAt);
  document.getElementById('receipt-list').innerHTML = tx.items.map(item=>`
    <div class="receipt-row">
      <span class="receipt-book">${escHtml(item.title)}</span>
      <span class="receipt-amt">×${item.qty} &nbsp; ${fmt(item.price*item.qty)}원</span>
    </div>`).join('');
  document.getElementById('receipt-overlay').style.display='flex';
}
function closeReceipt(e) { if(!e||e.target===document.getElementById('receipt-overlay')) document.getElementById('receipt-overlay').style.display='none'; }

// ── 판매 내역 ─────────────────────────────────────────────────
function updateSalesBadge() {
  const b = document.getElementById('sales-badge');
  if (sales.length>0) { b.textContent=sales.length; b.style.display=''; }
  else b.style.display='none';
}

function openSales() { selectedDate='all'; confirmDeleteId=null; renderSalesDrawer(); document.getElementById('sales-overlay').style.display='flex'; }
function closeSales(e) { if(!e||e.target===document.getElementById('sales-overlay')) document.getElementById('sales-overlay').style.display='none'; }

function renderSalesDrawer() {
  const dates = ['all',...[...new Set(sales.map(t=>dateOnly(t.paidAt)))].sort().reverse()];
  document.getElementById('date-filter').innerHTML = dates.map(d=>
    `<button class="date-btn${selectedDate===d?' on':''}" onclick="selectDate('${d}')">${d==='all'?'전체':d}</button>`
  ).join('');
  const filtered = selectedDate==='all' ? sales : sales.filter(t=>dateOnly(t.paidAt)===selectedDate);
  const sorted = [...filtered].sort((a,b)=>new Date(b.paidAt)-new Date(a.paidAt));
  const totalAmt = sorted.reduce((s,t)=>s+t.items.reduce((a,i)=>a+i.price*i.qty,0),0);
  const totalQty = sorted.reduce((s,t)=>s+t.items.reduce((a,i)=>a+i.qty,0),0);
  document.getElementById('sales-summary').innerHTML = `
    <div class="sum-item"><span class="sum-n">${sorted.length}</span><span class="sum-l">건</span></div>
    <div class="sum-div"></div>
    <div class="sum-item"><span class="sum-n">${totalQty}</span><span class="sum-l">권</span></div>
    <div class="sum-div"></div>
    <div class="sum-item"><span class="sum-n" style="color:#e8c87a">${fmt(totalAmt)}</span><span class="sum-l">원</span></div>`;
  if (!sorted.length) { document.getElementById('sales-list').innerHTML='<div class="drawer-empty">판매 내역이 없습니다</div>'; return; }
  document.getElementById('sales-list').innerHTML = sorted.map(tx=>{
    const txTotal = tx.items.reduce((s,i)=>s+i.price*i.qty,0);
    const isConfirm = confirmDeleteId===tx.id;
    return `
      <div class="tx-card">
        <div class="tx-head">
          <span class="tx-time">${toKST(tx.paidAt)}</span>
          <div class="tx-right">
            ${tx.discounted?'<span class="tx-disc-badge">10%↓</span>':''}
            <span class="tx-total">${fmt(txTotal)}원</span>
            ${isConfirm
              ?`<div class="del-confirm"><button class="del-yes" onclick="deleteTx('${tx.id}')">삭제</button><button class="del-no" onclick="cancelDelete()">취소</button></div>`
              :`<button class="del-btn" onclick="confirmDelete('${tx.id}')">✕</button>`}
          </div>
        </div>
        <div class="tx-items">${tx.items.map(item=>`
          <div class="tx-item">
            <span class="tx-item-title">${escHtml(item.title)}</span>
            <span class="tx-item-amt">×${item.qty} · ${fmt(item.price*item.qty)}원</span>
          </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function selectDate(d) { selectedDate=d; confirmDeleteId=null; renderSalesDrawer(); }
function confirmDelete(id) { confirmDeleteId=id; renderSalesDrawer(); }
function cancelDelete() { confirmDeleteId=null; renderSalesDrawer(); }
function deleteTx(id) {
  sales=sales.filter(t=>t.id!==id); saveSales(); updateSalesBadge(); confirmDeleteId=null; renderSalesDrawer();
}

function exportCSV() {
  const filtered = selectedDate==='all' ? sales : sales.filter(t=>dateOnly(t.paidAt)===selectedDate);
  if (!filtered.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const rows = [['결제일시','도서명','수량','단가','금액','할인적용']];
  filtered.forEach(tx=>tx.items.forEach(item=>rows.push([toKST(tx.paidAt),item.title,item.qty,item.price,item.price*item.qty,tx.discounted?'10%':'-'])));
  const csv = '\uFEFF'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='wonderbox_sales.csv'; a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
